name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env file
        run: |
          cat > .env << EOL
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          AUTH_STRAVA_ID="${{ secrets.AUTH_STRAVA_ID }}"
          AUTH_STRAVA_SECRET="${{ secrets.AUTH_STRAVA_SECRET }}"
          AUTH_SECRET="${{ secrets.AUTH_SECRET }}"
          CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}"
          CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}"
          CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}"
          BRIGHTDATA_USERNAME="${{ secrets.BRIGHTDATA_USERNAME }}"
          BRIGHTDATA_PASSWORD="${{ secrets.BRIGHTDATA_PASSWORD }}"
          NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"
          RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          NODE_ENV=production
          PORT=3000
          DISPLAY=:99
          CHROME_PATH=/usr/bin/google-chrome-stable
          AUTH_TRUST_HOST=true
          SKIP_ENV_VALIDATION=1
          EOL

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Build project
        run: yarn build
        env:
          SKIP_ENV_VALIDATION: '1'

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp -r prisma deploy-package/
          cp -r node_modules deploy-package/
          cp -r deploy deploy-package/
          cp package.json deploy-package/
          cp yarn.lock deploy-package/
          cp ecosystem.config.cjs deploy-package/
          cp .env deploy-package/

      - name: Deploy to GCP VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: 'deploy-package/*'
          target: '/home/realjefienemokwu/strive'
          strip_components: 1

      - name: Run setup script (first-time provisioning)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🔧 Loading NVM and using Node 20..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            if ! nvm ls 20 &> /dev/null; then
              echo "Installing Node 20..."
              nvm install 20
            fi

            nvm use 20

            # Run setup script if Chrome or Xvfb not installed yet
            if ! command -v google-chrome-stable &> /dev/null || ! systemctl is-active --quiet xvfb; then
              echo "🛠️ Running first-time setup..."
              cd /home/realjefienemokwu/strive
              sudo bash deploy/setup-ec2.sh
            else
              echo "✅ Setup already complete, skipping..."
            fi

      - name: Run deploy script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🔧 Loading NVM and using Node 20..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /home/ec2-user/strive
            bash deploy/deploy.sh

            echo "✅ Deployment complete!"
