name: Deploy to EC2 Instance

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Build project
        run: yarn build
        env:
          SKIP_ENV_VALIDATION: '1'

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp -r prisma deploy-package/
          cp -r node_modules deploy-package/
          cp -r deploy deploy-package/
          cp package.json deploy-package/
          cp yarn.lock deploy-package/
          cp ecosystem.config.cjs deploy-package/

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: 'deploy-package/*'
          target: '/home/ec2-user/strive'
          strip_components: 1

      - name: Install dependencies and restart PM2 on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "� Loading NVM and using Node 20..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            if ! nvm ls 20 &> /dev/null; then
              echo "Installing Node 20..."
              nvm install 20
            fi

            nvm use 20

            if ! command -v pm2 &> /dev/null; then
              echo "⬇️ PM2 not found. Installing globally..."
              npm install -g pm2
            fi

            echo "📁 Switching to app directory..."
            cd /home/ec2-user/strive

            echo "📋 Checking deployment files..."
            ls -la

            if [ ! -d ".next" ]; then
              echo "❌ Error: .next directory not found!"
              exit 1
            fi

            echo "🗄️ Running database migrations..."
            npx prisma db push --accept-data-loss

            echo "� Restarting with PM2..."
            pm2 delete "strive" || true

            echo "🚀 Starting app via Ecosystem..."
            pm2 start ecosystem.config.cjs

            echo "💾 Saving PM2 state..."
            pm2 save

            echo "✅ Deployment complete!"
