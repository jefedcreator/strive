services:
  web:
    # platform: linux/x86_64
    build: .
    container_name: strive
    restart: always
    environment:
      - NODE_ENV=production
      # Database
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      # Cloudinary
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Strava
      - AUTH_STRAVA_ID=${AUTH_STRAVA_ID}
      - AUTH_STRAVA_SECRET=${AUTH_STRAVA_SECRET}
      # Next Auth
      - NEXTAUTH_URL=http://localhost
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_APP_URL=http://localhost
      - PORT=3000
      - INTERNAL_API_URL=http://localhost:3000
      # Chrome/Puppeteer - CRITICAL: Must match Dockerfile installation path
      # - CHROME_PATH=/usr/bin/google-chrome-stable
      # - PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable
      - DOCKER_ENV=true
      - BRIGHTDATA_PROXY_HOST=brd.superproxy.io:33335
      - BRIGHTDATA_USERNAME=${BRIGHTDATA_USERNAME}
      - BRIGHTDATA_PASSWORD=${BRIGHTDATA_PASSWORD}
      # BrightData Scraping Browser — remote Chrome via WebSocket (bypasses bot detection)
      - BRIGHTDATA_BROWSER_WS=${BRIGHTDATA_BROWSER_WS}
      # - DOCKER_DEFAULT_PLATFORM=linux/amd64
    expose:
      - "3000"
    shm_size: '2gb'
    security_opt:
      - seccomp:unconfined
    networks:
      - app-network
    volumes:
      - ./debug:/app/public/debug
  nginx:
    image: nginx:alpine
    container_name: strive-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL certificates
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge